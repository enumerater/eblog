version: "3.8"

# ============================================================================
# eblog 微服务 — 基础设施 Docker Compose
# 用途: 开发/测试环境一键启动依赖服务
# 使用: docker compose -f docker-compose.yml up -d
# 注意: 业务服务 (gateway/auth/article 等) 在 IDE 中启动, 便于调试
# ============================================================================

services:
  # ─── MySQL 8 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eblog-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: my_blog
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d   # 自动初始化
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
      - --binlog_format=ROW                      # Canal 需要 ROW 格式
      - --log_bin=mysql-bin
      - --binlog-do-db=my_blog
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eblog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Nacos (Standalone) ──────────────────────────────────────────────────
  # 控制台: http://localhost:8848/nacos  账号: nacos / nacos
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: eblog-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"       # gRPC 端口
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "SecretKey012345678901234567890123456789012345678901234567890123456789"

      # 新增下面两行，关闭严格身份校验，兼容旧客户端
      nacos.core.auth.enable.userAgentAuthWhite: true
      nacos.core.auth.server.identity.key: serverIdentityKey
      nacos.core.auth.server.identity.value: serverIdentityValue
      
    volumes:
      - nacos-data:/home/nacos/derby-data
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy

  # ─── RocketMQ (Namesrv + Broker + Dashboard) ──────────────────────────
  # Dashboard: http://localhost:18080
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: eblog-rmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-server -Xms128m -Xmx256m"
    command: sh mqnamesrv
    volumes:
      - rmq-namesrv-logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: eblog-rmq-broker
    restart: unless-stopped
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx512m"
    command: broker -n rocketmq-namesrv:9876 -c ../conf/broker.conf
    volumes:
      - ./config/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf
      - rmq-broker-logs:/home/rocketmq/logs
    depends_on:
      - rocketmq-namesrv

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: eblog-rmq-dashboard
    restart: unless-stopped
    ports:
      - "18080:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=eblog-rmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      - rocketmq-namesrv

  # ─── Seata Server (AT 模式分布式事务协调者) ──────────────────────────
  # 控制台: http://localhost:7091  账号: seata / seata
  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: eblog-seata-server
    restart: unless-stopped
    ports:
      - "7091:7091"       # HTTP 控制台
      - "8091:8091"       # TC 服务端口
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: 8091
      STORE_MODE: db
    volumes:
      - ./config/seata/seata-server.yml:/seata-server/resources/application.yml
      - seata-logs:/root/logs/seata
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started

  # ─── Elasticsearch 8 全文检索 ──────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: eblog-es
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  kibana:
    image: kibana:8.17.0
    container_name: eblog-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ─── Canal (MySQL Binlog 监听) ──────────────────────────────────────────
  # 监听 my_blog 数据库的 binlog, 推送到 RocketMQ
  canal:
    image: canal/canal-server:v1.1.7
    container_name: eblog-canal
    restart: unless-stopped
    ports:
      - "11111:11111"
    environment:
      canal.instance.master.address: mysql:3306
      canal.instance.dbUsername: root
      canal.instance.dbPassword: 1234
      canal.instance.connectionCharset: UTF-8
      canal.instance.tsdb.enable: "true"
      canal.instance.filter.regex: my_blog\\..*    # 监听所有表
      canal.mq.topic: cdc-topic
      canal.serverMode: rocketMQ
      canal.mq.rocketmq.namesrv: rocketmq-namesrv:9876
    volumes:
      - canal-logs:/home/admin/canal-server/logs
    depends_on:
      mysql:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  rmq-namesrv-logs:
  rmq-broker-logs:
  rmq-broker-store:
  canal-logs:
  seata-logs:
  es-data: