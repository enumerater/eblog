server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/db_auth?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: Auth-HikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # 不使用 Nacos 导入 (本地开发)
  config:
    import: "optional:configserver:"

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.enumerate.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      insert-strategy: not_null

# ─── JWT ──────────────────────────────────────────────────────────────
jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-ttl-seconds: 900
  refresh-token-ttl-seconds: 604800
  issuer: eblog-auth

# ─── 管理员 ───────────────────────────────────────────────────────────
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:1234}

# Sentinel (本地启动禁用)
sentinel:
  enabled: false
  transport:
    dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8718}
    port: 8720

# 日志
logging:
  level:
    com.enumerate: DEBUG