server.port=8084
spring.application.name=comment-service

# Nacos
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.file-extension=properties
spring.cloud.nacos.username=nacos
spring.cloud.nacos.password=nacos
spring.cloud.nacos.config.import-check.enabled=false

# 从 Nacos 拉取共享配置
spring.config.import=optional:nacos:common.properties?refreshEnabled=true,optional:nacos:${spring.application.name}.properties?refreshEnabled=true

# 时区配置 (MySQL Docker 默认 UTC, Java/前端在 UTC+8)
spring.jackson.time-zone=Asia/Shanghai