spring:
  application:
    name: article-service

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/my_blog?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: Article-HikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  