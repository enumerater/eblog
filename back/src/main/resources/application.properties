server.port=8080
spring.application.name=eblog

# ========== DataSource ==========
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/my_blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== MyBatis-Plus ==========
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ========== Redis ==========
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ========== JWT ==========
# 使用 HMAC-SHA256 对称签名，自定义一个足够长的密钥即可
# 不配置则使用默认密钥（生产环境务必修改！）
# jwt.secret=my-super-secret-key-at-least-32-chars-long
jwt.access-token-ttl-seconds=900
jwt.refresh-token-ttl-seconds=604800
jwt.issuer=eblog

# ========== Aliyun OSS ==========
# ???OSS
aliyun.oss.endpoint=oss-cn-qingdao.aliyuncs.com
aliyun.oss.access-key-id=${OSS_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${OSS_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=enumerate-oss

# ========== Logging ==========
logging.level.com.enumerate.eblog=DEBUG


jwt.secret=my-super-secret-key-at-least-32-chars-long