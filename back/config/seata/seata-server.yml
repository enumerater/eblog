# Seata Server 配置
# 用于 docker-compose 中 seata-server 容器的 /seata-server/resources/application.yml
server:
  port: 7091

spring:
  application:
    name: seata-server

logging:
  config: classpath:logback-spring.xml
  file:
    path: ${log.home:${user.home}/logs/seata}

console:
  user:
    username: seata
    password: seata

seata:
  # 配置中心：使用本地文件
  config:
    type: file
  # 注册中心：使用 file 模式（不向 Nacos 注册，客户端通过 grouplist 直连）
  registry:
    type: file
  # TC 服务端口
  server:
    service-port: 8091
  # DB 模式存储事务记录
  store:
    mode: db
    db:
      datasource: druid
      db-type: mysql
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://mysql:3306/my_blog?useUnicode=true&useSSL=false&rewriteBatchedStatements=true
      user: root
      password: 1234
      min-conn: 5
      max-conn: 100
      global-table: global_table
      branch-table: branch_table
      lock-table: lock_table
      distributed-lock-table: distributed_lock
      query-limit: 100
      max-wait: 5000
  # 安全配置
  security:
    secretKey: SeataSecretKey0c382ef121d778043159209298fd40bf3850a017
    tokenValidityInMilliseconds: 1800000
    ignore:
      urls: /,/**/*.css,/**/*.js,/**/*.html,/**/*.map,/**/*.svg,/**/*.png,/**/*.jpeg,/**/*.ico,/api/v1/auth/login,/metadata/v1/**
