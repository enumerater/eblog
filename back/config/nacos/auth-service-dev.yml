# ============================================================================
# Auth Service 配置 (Nacos 动态配置)
# Data ID: auth-service-dev.yml
# ============================================================================

server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/db_auth?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai

jwt:
  access-token-ttl-seconds: 900
  refresh-token-ttl-seconds: 604800
  issuer: eblog-auth

admin:
  username: admin
  password: 1234
