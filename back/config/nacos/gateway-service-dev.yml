# ============================================================================
# Gateway Service 配置 (Nacos 动态配置)
# Data ID: gateway-service-dev.yml
# ============================================================================

server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: article-service
          uri: lb://article-service
          predicates:
            - Path=/api/articles/**
          filters:
            - name: JwtAuth
              args:
                publicPaths: >
                  GET:/api/articles,
                  GET:/api/articles/**
        - id: article-query-service
          uri: lb://article-query-service
          predicates:
            - Path=/api/articles-query/**
        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/api/comments/**
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
        - id: intelligence-service
          uri: lb://intelligence-service
          predicates:
            - Path=/api/intelligence/**
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/api/files/**,/api/upload/**
          filters:
            - name: JwtAuth
              args:
                publicPaths: >
                  GET:/api/files/**

sentinel:
  datasource:
    ds1:
      nacos:
        server-addr: ${spring.cloud.nacos.config.server-addr}
        data-id: sentinel-gateway-rules.json
        group: DEFAULT_GROUP
        data-type: json
        rule-type: gw-flow
        rule-type: gw-api-group

jwt:
  public-key: ${JWT_PUBLIC_KEY:}
