# eblog RocketMQ Broker 配置
brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH

# 自动创建 Topic（开发环境）
autoCreateTopicEnable = true
autoCreateSubscriptionGroup = true

# 监听地址
namesrvAddr = rocketmq-namesrv:9876
listenPort = 10911

# 客户端可访问的地址 (RocketMQ 通过此值告知客户端连接地址)
# 宿主机上运行的微服务 -> 127.0.0.1:10911 (Docker Desktop 端口映射)
brokerIP1 = 127.0.0.1
