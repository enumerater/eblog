<svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="500" height="600" fill="#f0f0f0"/>
  <rect x="0" y="0" width="200" height="400" fill="#b87333"/>
  <rect x="200" y="0" width="300" height="400" fill="#e8e8e8"/>
  
  <!-- 桌面 -->
  <rect x="0" y="500" width="500" height="100" fill="#8b5a2b"/>
  
  <!-- 书本 -->
  <rect x="0" y="520" width="120" height="70" fill="#ffffff" stroke="#ddd" stroke-width="1"/>
  
  <!-- 笔 -->
  <rect x="320" y="540" width="20" height="40" rx="5" fill="#660000"/>
  
  <!-- 人物身体与外套 -->
  <path d="M 50 300 Q 100 280, 150 320 L 450 320 Q 480 350, 460 550 L 40 550 Q 20 450, 50 300" fill="#c9c9c9"/>
  <!-- 毛领 -->
  <path d="M 180 350 Q 250 330, 320 350 L 380 380 Q 350 450, 320 500 L 180 500 Q 150 450, 180 350" fill="#e0d0c0"/>
  
  <!-- 头发 -->
  <path d="M 220 50 Q 300 30, 380 80 Q 400 150, 370 250 L 230 250 Q 200 150, 220 50" fill="#2a2a2a"/>
  <!-- 刘海 -->
  <path d="M 230 150 Q 300 130, 370 150 L 360 220 Q 300 200, 240 220 Z" fill="#2a2a2a"/>
  
  <!-- 脸 -->
  <ellipse cx="300" cy="280" rx="80" ry="100" fill="#d4a58a"/>
  
  <!-- 眼睛 -->
  <ellipse cx="260" cy="260" rx="15" ry="8" fill="#2a2a2a"/>
  <ellipse cx="340" cy="260" rx="15" ry="8" fill="#2a2a2a"/>
  
  <!-- 鼻子和嘴 -->
  <path d="M 300 280 L 295 310 L 305 310 Z" fill="#c98a65"/>
  <path d="M 280 330 Q 300 340, 320 330" fill="none" stroke="#c98a65" stroke-width="2"/>
  
  <!-- 耳环 -->
  <circle cx="385" cy="280" r="8" fill="#3cb371"/>
  <circle cx="385" cy="295" r="6" fill="#3cb371"/>
  
  <!-- 新华字典 修正：红皮在下，白色封面在上 -->
  <path d="M 200 390 Q 250 370, 300 400 L 400 360 Q 450 390, 420 440 L 250 480 Q 200 460, 200 390" fill="#e60000"/>
  <path d="M 150 380 Q 200 360, 250 390 L 400 350 Q 450 380, 420 430 L 200 470 Q 150 450, 150 380" fill="#ffffff"/>
  <!-- 文字 -->
  <text x="320" y="420" font-size="20" fill="#e60000" font-weight="bold"></text>
  
  <!-- 手 -->
  <path d="M 160 360 Q 120 400, 150 480 L 280 480 Q 300 420, 250 380 Z" fill="#d4a58a"/>
  <path d="M 350 430 Q 420 450, 400 500 L 300 520 Q 280 480, 330 450 Z" fill="#d4a58a"/>
</svg>